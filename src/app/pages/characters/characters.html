<main class="characters-page">
  <header class="characters-header">
    <button class="back-button" routerLink="/">Zurück</button>
    <h1>Charaktere</h1>
  </header>

  <section class="character-grid">
    <article class="character-card">
      <img class="character-image" src="/characters/Xyros.png" alt="Xyros">

      <div class="character-info">
        <p class="character-role">Antagonist</p>
        <h2>Xyros</h2>
        <p>Der Beobachter im Schatten. X-Augen. Kein Zufall.</p>
      </div>
    </article>

    <article class="character-card">
      <img class="character-image" src="/characters/Crackyman.png" alt="Crackyman">

      <div class="character-info">
        <p class="character-role">Antagonist</p>
        <h2>Crackyman</h2>
        <p>Eine Figur zwischen Chaos, Jagd und Fehlern, die alles verändern.</p>
      </div>
    </article>

    <article class="character-card">
      <img class="character-image" src="/characters/Niklas.png" alt="Niklas">

      <div class="character-info">
        <p class="character-role">Protagonist</p>
        <h2>Niklas</h2>
        <p>Keine Ahnung wie ich hier gelandet bin tbh.</p>
      </div>
    </article>
  </section>
</main>
